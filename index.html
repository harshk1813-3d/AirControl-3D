<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Controlled 3D Viewer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f6f6f2;
            color: #050505;
            font-family: Inter, "Segoe UI", Arial, Helvetica, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #webcam {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.32;
            filter: blur(10px);
        }

        #canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
            z-index: 4;
        }

        #three-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        #status,
        #gesture-panel {
            position: absolute;
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.14);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            color: #050505;
        }

        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 86px;
            z-index: 12;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 0 34px;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
            color: #050505;
        }

        #divider {
            width: 1px;
            height: 42px;
            background: rgba(0, 0, 0, 0.42);
            flex: 0 0 auto;
        }

        #tagline {
            margin: 0;
            max-width: 360px;
            font-size: 18px;
            line-height: 1.12;
            font-weight: 300;
            letter-spacing: 0;
            text-align: left;
        }

        #brand {
            margin: 0;
            font-size: 30px;
            line-height: 1;
            font-weight: 700;
            letter-spacing: 0;
            text-align: left;
            white-space: nowrap;
        }

        #status {
            top: 104px;
            left: 18px;
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.35;
            font-family: Arial, Helvetica, sans-serif;
        }

        #gesture-panel {
            right: 18px;
            bottom: 18px;
            width: min(300px, calc(100vw - 36px));
            padding: 12px;
            font-size: 13px;
            line-height: 1.45;
            font-family: Arial, Helvetica, sans-serif;
        }

        #gesture-panel strong {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        #gesture-panel span {
            display: block;
            color: rgba(0, 0, 0, 0.68);
        }

        @media (max-width: 640px) {
            #top-bar {
                height: 78px;
                padding: 0 16px;
                gap: 12px;
            }

            #divider {
                height: 36px;
            }

            #tagline {
                font-size: 15px;
            }

            #brand {
                font-size: 22px;
            }

            #status {
                top: 88px;
                left: 10px;
                right: 10px;
            }

            #gesture-panel {
                right: 10px;
                bottom: 10px;
                left: 10px;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="three-canvas"></div>
        <header id="top-bar">
            <h1 id="brand">AirControl 3D</h1>
            <div id="divider"></div>
            <p id="tagline">Where Motion<br>Becomes Control.</p>
        </header>
        <div id="status">Loading hand tracking...</div>
        <div id="gesture-panel">
            <strong>Hand Controls</strong>
            <span>Right hand: move your index finger to rotate.</span>
            <span>Left hand: pinch thumb and index, then move to pan.</span>
            <span>Both hands: move hands closer/farther to zoom.</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const MODEL_URL = 'esl_black.glb';

            const videoElement = document.getElementById('webcam');
            const canvasElement = document.getElementById('canvas');
            const canvasCtx = canvasElement.getContext('2d');
            const statusElement = document.getElementById('status');
            const threeContainer = document.getElementById('three-canvas');

            let scene;
            let camera;
            let renderer;
            let modelRoot;

            const viewState = {
                rotationX: 0.1,
                rotationY: -0.35,
                panX: 0,
                panY: 0,
                zoom: 1,
                targetRotationX: 0.1,
                targetRotationY: -0.35,
                targetPanX: 0,
                targetPanY: 0,
                targetZoom: 1
            };

            const gestureState = {
                lastPointer: null,
                lastPinchPoint: null,
                lastTwoHandDistance: null,
                lastTwoHandMidpoint: null,
                smoothedTwoHandDistance: null
            };

            const zoomSettings = {
                smoothing: 0.35,
                deadZone: 0.003,
                maxDelta: 0.035,
                sensitivity: 5.2
            };

            function updateCanvasSize() {
                canvasElement.width = window.innerWidth;
                canvasElement.height = window.innerHeight;
            }

            function resizeRenderer() {
                updateCanvasSize();

                if (renderer) {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }

                if (camera) {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                }
            }

            window.addEventListener('resize', resizeRenderer);
            resizeRenderer();

            async function initWebcam() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1920 },
                            height: { ideal: 1080 },
                            facingMode: 'user'
                        }
                    });

                    videoElement.srcObject = stream;

                    return new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => {
                            resizeRenderer();
                            resolve(videoElement);
                        };
                    });
                } catch (error) {
                    statusElement.textContent = `Camera error: ${error.message}`;
                    throw error;
                }
            }

            function initThreeJS() {
                scene = new THREE.Scene();

                camera = new THREE.PerspectiveCamera(
                    55,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                camera.position.set(0, 0.25, 6);

                renderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true
                });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0);
                threeContainer.appendChild(renderer.domElement);

                modelRoot = new THREE.Group();
                scene.add(modelRoot);

                const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
                keyLight.position.set(4, 5, 6);
                scene.add(keyLight);

                const fillLight = new THREE.DirectionalLight(0x8fd3ff, 0.9);
                fillLight.position.set(-4, 2, 3);
                scene.add(fillLight);

                const rimLight = new THREE.DirectionalLight(0xff7ad9, 0.75);
                rimLight.position.set(0, 4, -5);
                scene.add(rimLight);

                scene.add(new THREE.AmbientLight(0xffffff, 0.45));

                loadModel();
                animate();
            }

            function loadModel() {
                if (!MODEL_URL) {
                    addPlaceholderModel();
                    statusElement.textContent = 'No model selected. Using placeholder.';
                    return;
                }

                statusElement.textContent = `Loading ${MODEL_URL}...`;
                const loader = new THREE.GLTFLoader();
                loader.load(
                    MODEL_URL,
                    (gltf) => {
                        modelRoot.clear();
                        modelRoot.add(gltf.scene);
                        fitModelToView(gltf.scene);
                        statusElement.textContent = 'Model loaded. Show one or two hands.';
                    },
                    undefined,
                    (error) => {
                        console.error('Model load error:', error);
                        addPlaceholderModel();
                        statusElement.textContent = `Could not load ${MODEL_URL}. Using placeholder.`;
                    }
                );
            }

            function addPlaceholderModel() {
                modelRoot.clear();

                const material = new THREE.MeshStandardMaterial({
                    color: 0x42e8f4,
                    metalness: 0.35,
                    roughness: 0.28
                });
                const accentMaterial = new THREE.MeshStandardMaterial({
                    color: 0xff4fd8,
                    metalness: 0.2,
                    roughness: 0.35
                });

                const body = new THREE.Mesh(new THREE.TorusKnotGeometry(1.05, 0.32, 160, 24), material);
                const ring = new THREE.Mesh(new THREE.TorusGeometry(1.65, 0.025, 16, 120), accentMaterial);
                ring.rotation.x = Math.PI / 2;

                const base = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.9, 1.15, 0.16, 64),
                    new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        metalness: 0.1,
                        roughness: 0.55
                    })
                );
                base.position.y = -1.45;

                modelRoot.add(body, ring, base);
            }

            function fitModelToView(object) {
                const box = new THREE.Box3().setFromObject(object);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                const maxDimension = Math.max(size.x, size.y, size.z) || 1;
                const scale = 2.4 / maxDimension;

                object.position.sub(center);
                object.scale.setScalar(scale);
            }

            function animate() {
                requestAnimationFrame(animate);

                viewState.rotationX += (viewState.targetRotationX - viewState.rotationX) * 0.16;
                viewState.rotationY += (viewState.targetRotationY - viewState.rotationY) * 0.16;
                viewState.panX += (viewState.targetPanX - viewState.panX) * 0.16;
                viewState.panY += (viewState.targetPanY - viewState.panY) * 0.16;
                viewState.zoom += (viewState.targetZoom - viewState.zoom) * 0.14;

                if (modelRoot) {
                    modelRoot.rotation.x = viewState.rotationX;
                    modelRoot.rotation.y = viewState.rotationY;
                    modelRoot.position.x = viewState.panX;
                    modelRoot.position.y = viewState.panY;
                    modelRoot.scale.setScalar(viewState.zoom);
                }

                renderer.render(scene, camera);
            }

            function calculateDistance(point1, point2) {
                const dx = point1.x - point2.x;
                const dy = point1.y - point2.y;
                const dz = point1.z - point2.z;
                return Math.sqrt(dx * dx + dy * dy + dz * dz);
            }

            function midpoint(point1, point2) {
                return {
                    x: (point1.x + point2.x) / 2,
                    y: (point1.y + point2.y) / 2
                };
            }

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function smoothValue(previous, next, amount) {
                if (previous === null || previous === undefined) {
                    return next;
                }

                return previous + (next - previous) * amount;
            }

            function applyDeadZone(value, threshold) {
                return Math.abs(value) < threshold ? 0 : value;
            }

            function isPinching(landmarks) {
                return calculateDistance(landmarks[4], landmarks[8]) < 0.075;
            }

            function drawLandmarks(landmarks, isLeft) {
                const screenSize = Math.min(window.innerWidth, window.innerHeight);
                const lineWidth = Math.max(2, Math.min(5, screenSize / 300));
                const pointSize = Math.max(2, Math.min(7, screenSize / 260));
                const handColor = isLeft ? '#67ff78' : '#5de7ff';

                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    [0, 17], [17, 18], [18, 19], [19, 20],
                    [5, 9], [9, 13], [13, 17]
                ];

                canvasCtx.lineWidth = lineWidth;
                canvasCtx.strokeStyle = handColor;

                connections.forEach(([i, j]) => {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(landmarks[i].x * canvasElement.width, landmarks[i].y * canvasElement.height);
                    canvasCtx.lineTo(landmarks[j].x * canvasElement.width, landmarks[j].y * canvasElement.height);
                    canvasCtx.stroke();
                });

                landmarks.forEach((landmark, index) => {
                    canvasCtx.fillStyle = index === 4 || index === 8 ? '#ff4f4f' : handColor;
                    canvasCtx.beginPath();
                    canvasCtx.arc(
                        landmark.x * canvasElement.width,
                        landmark.y * canvasElement.height,
                        pointSize,
                        0,
                        Math.PI * 2
                    );
                    canvasCtx.fill();
                });
            }

            function resetGestureMemory() {
                gestureState.lastPointer = null;
                gestureState.lastPinchPoint = null;
                gestureState.lastTwoHandDistance = null;
                gestureState.lastTwoHandMidpoint = null;
                gestureState.smoothedTwoHandDistance = null;
            }

            function handleRotate(landmarks) {
                const indexTip = landmarks[8];

                gestureState.lastTwoHandDistance = null;
                gestureState.lastTwoHandMidpoint = null;
                gestureState.smoothedTwoHandDistance = null;
                gestureState.lastPinchPoint = null;

                if (gestureState.lastPointer) {
                    const dx = indexTip.x - gestureState.lastPointer.x;
                    const dy = indexTip.y - gestureState.lastPointer.y;
                    viewState.targetRotationY += dx * 7;
                    viewState.targetRotationX += dy * 5;
                    viewState.targetRotationX = clamp(viewState.targetRotationX, -Math.PI / 2, Math.PI / 2);
                }

                gestureState.lastPointer = { x: indexTip.x, y: indexTip.y };
                statusElement.textContent = 'Rotating model';
            }

            function handlePinchPan(landmarks) {
                const pinchPoint = midpoint(landmarks[4], landmarks[8]);

                gestureState.lastTwoHandDistance = null;
                gestureState.lastTwoHandMidpoint = null;
                gestureState.smoothedTwoHandDistance = null;
                gestureState.lastPointer = null;

                if (!isPinching(landmarks)) {
                    gestureState.lastPinchPoint = null;
                    statusElement.textContent = 'Pinch to pan';
                    return;
                }

                if (gestureState.lastPinchPoint) {
                    const dx = pinchPoint.x - gestureState.lastPinchPoint.x;
                    const dy = pinchPoint.y - gestureState.lastPinchPoint.y;
                    viewState.targetPanX = clamp(viewState.targetPanX - dx * 6, -2.4, 2.4);
                    viewState.targetPanY = clamp(viewState.targetPanY - dy * 4, -1.8, 1.8);
                }

                gestureState.lastPinchPoint = pinchPoint;
                statusElement.textContent = 'Panning model';
            }

            function handleTwoHands(firstHand, secondHand) {
                const firstIndex = firstHand[8];
                const secondIndex = secondHand[8];
                const rawHandDistance = calculateDistance(firstIndex, secondIndex);
                const handDistance = smoothValue(
                    gestureState.smoothedTwoHandDistance,
                    rawHandDistance,
                    zoomSettings.smoothing
                );
                const handMidpoint = midpoint(firstIndex, secondIndex);

                gestureState.smoothedTwoHandDistance = handDistance;

                if (gestureState.lastTwoHandDistance !== null) {
                    const zoomDelta = clamp(
                        applyDeadZone(handDistance - gestureState.lastTwoHandDistance, zoomSettings.deadZone),
                        -zoomSettings.maxDelta,
                        zoomSettings.maxDelta
                    );
                    viewState.targetZoom = clamp(
                        viewState.targetZoom + zoomDelta * zoomSettings.sensitivity,
                        0.35,
                        3.2
                    );
                }

                gestureState.lastTwoHandDistance = handDistance;
                gestureState.lastTwoHandMidpoint = handMidpoint;
                gestureState.lastPointer = null;
                gestureState.lastPinchPoint = null;
                statusElement.textContent = 'Zooming model with both hands';
            }

            async function initMediaPipeHands() {
                const hands = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.55,
                    minTrackingConfidence: 0.55
                });

                await hands.initialize();
                return hands;
            }

            function onResults(results) {
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (
                    canvasElement.width !== window.innerWidth ||
                    canvasElement.height !== window.innerHeight
                ) {
                    updateCanvasSize();
                }

                const hands = results.multiHandLandmarks || [];

                if (!hands.length) {
                    resetGestureMemory();
                    statusElement.textContent = 'Show your hand to control the model';
                    return;
                }

                hands.forEach((landmarks, index) => {
                    const handedness = results.multiHandedness[index].label;
                    drawLandmarks(landmarks, handedness === 'Left');
                });

                if (hands.length >= 2) {
                    handleTwoHands(hands[0], hands[1]);
                } else {
                    const handedness = results.multiHandedness[0].label;

                    if (handedness === 'Left') {
                        handleRotate(hands[0]);
                    } else {
                        handlePinchPan(hands[0]);
                    }
                }
            }

            async function startApp() {
                try {
                    await initWebcam();
                    initThreeJS();

                    const hands = await initMediaPipeHands();
                    hands.onResults(onResults);

                    const mediaPipeCamera = new Camera(videoElement, {
                        onFrame: async () => {
                            await hands.send({ image: videoElement });
                        },
                        width: 1920,
                        height: 1080
                    });

                    mediaPipeCamera.start();
                } catch (error) {
                    statusElement.textContent = `Error: ${error.message}`;
                    console.error('Error starting viewer:', error);
                }
            }

            startApp();
        });
    </script>
</body>
</html>
