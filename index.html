<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Controlled 3D Viewer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f6f6f2;
            color: #050505;
            font-family: Inter, "Segoe UI", Arial, Helvetica, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #webcam {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.32;
            filter: blur(10px);
        }

        #canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
            z-index: 4;
        }

        #model-viewer {
            position: absolute;
            top: 86px;
            right: -70%;
            bottom: -70%;
            left: -70%;
            width: auto;
            height: auto;
            pointer-events: none;
            z-index: 3;
            background: transparent;
            transform-origin: center center;
            will-change: transform;
        }

        #status,
        #gesture-panel {
            position: absolute;
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.14);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            color: #050505;
        }

        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 86px;
            z-index: 12;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 0 34px;
            background: rgba(255, 255, 255, 0.94);
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
            color: #050505;
        }

        #divider {
            width: 1px;
            height: 42px;
            background: rgba(0, 0, 0, 0.42);
            flex: 0 0 auto;
        }

        #tagline {
            margin: 0;
            max-width: 360px;
            font-size: 18px;
            line-height: 1.12;
            font-weight: 300;
            letter-spacing: 0;
            text-align: left;
        }

        #brand {
            margin: 0;
            font-size: 30px;
            line-height: 1;
            font-weight: 700;
            letter-spacing: 0;
            text-align: left;
            white-space: nowrap;
        }

        #status {
            top: 104px;
            left: 18px;
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.35;
            font-family: Arial, Helvetica, sans-serif;
        }

        #gesture-panel {
            right: 18px;
            bottom: 18px;
            width: min(300px, calc(100vw - 36px));
            padding: 12px;
            font-size: 13px;
            line-height: 1.45;
            font-family: Arial, Helvetica, sans-serif;
        }

        #gesture-panel strong {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        #gesture-panel span {
            display: block;
            color: rgba(0, 0, 0, 0.68);
        }

        #reset-button {
            position: absolute;
            right: 18px;
            top: 104px;
            z-index: 13;
            border: 1px solid rgba(0, 0, 0, 0.16);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.78);
            color: #050505;
            padding: 10px 14px;
            font: 600 14px/1 Inter, "Segoe UI", Arial, Helvetica, sans-serif;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        #reset-button:hover {
            background: rgba(255, 255, 255, 0.95);
        }

        @media (max-width: 640px) {
            #model-viewer {
                top: 78px;
            }

            #top-bar {
                height: 78px;
                padding: 0 16px;
                gap: 12px;
            }

            #divider {
                height: 36px;
            }

            #tagline {
                font-size: 15px;
            }

            #brand {
                font-size: 22px;
            }

            #status {
                top: 88px;
                left: 10px;
                right: 10px;
            }

            #gesture-panel {
                right: 10px;
                bottom: 10px;
                left: 10px;
                width: auto;
            }

            #reset-button {
                top: 138px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <model-viewer
            id="model-viewer"
            src="duffel_bag.glb"
            camera-orbit="-20deg 78deg 28m"
            camera-target="0m 0m 0m"
            field-of-view="60deg"
            scale="0.06 0.06 0.06"
            exposure="1"
            shadow-intensity="0.45"
            interaction-prompt="none"
            autoplay>
        </model-viewer>
        <header id="top-bar">
            <h1 id="brand">AirControl 3D</h1>
            <div id="divider"></div>
            <p id="tagline">Where Motion<br>Becomes Control.</p>
        </header>
        <div id="status">Loading hand tracking...</div>
        <button id="reset-button" type="button">Reset Position</button>
        <div id="gesture-panel">
            <strong>Hand Controls</strong>
            <span>Right hand: move your index finger to rotate.</span>
            <span>Left hand: pinch thumb and index, then move to pan.</span>
            <span>Both hands: move hands closer/farther to zoom.</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const MODEL_URL = 'duffel_bag.glb';

            const videoElement = document.getElementById('webcam');
            const canvasElement = document.getElementById('canvas');
            const canvasCtx = canvasElement.getContext('2d');
            const statusElement = document.getElementById('status');
            const modelViewer = document.getElementById('model-viewer');
            const resetButton = document.getElementById('reset-button');

            const viewState = {
                theta: -20,
                phi: 78,
                radius: 28,
                fov: 60,
                panX: 0,
                panY: 0,
                targetTheta: -20,
                targetPhi: 78,
                targetRadius: 28,
                targetFov: 60,
                targetPanX: 0,
                targetPanY: 0
            };

            const gestureState = {
                lastPointer: null,
                lastPinchPoint: null,
                lastTwoHandDistance: null,
                smoothedTwoHandDistance: null
            };

            const zoomSettings = {
                smoothing: 0.6,
                deadZone: 0.001,
                maxDelta: 0.08,
                sensitivity: 95
            };

            const panSettings = {
                sensitivity: 520,
                limit: 300
            };

            function updateCanvasSize() {
                canvasElement.width = window.innerWidth;
                canvasElement.height = window.innerHeight;
            }

            function resizeCanvas() {
                updateCanvasSize();
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            async function initWebcam() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1920 },
                            height: { ideal: 1080 },
                            facingMode: 'user'
                        }
                    });

                    videoElement.srcObject = stream;

                    return new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => {
                            resizeCanvas();
                            resolve(videoElement);
                        };
                    });
                } catch (error) {
                    statusElement.textContent = `Camera error: ${error.message}`;
                    throw error;
                }
            }

            function initModelViewer() {
                modelViewer.src = MODEL_URL;
                modelViewer.addEventListener('load', () => {
                    statusElement.textContent = 'Model loaded. Show one or two hands.';
                });
                modelViewer.addEventListener('error', () => {
                    statusElement.textContent = `Could not load ${MODEL_URL}.`;
                });
                updateModelViewer();
                animateViewer();
            }

            function updateModelViewer() {
                modelViewer.setAttribute(
                    'camera-orbit',
                    `${viewState.theta.toFixed(2)}deg ${viewState.phi.toFixed(2)}deg ${viewState.radius.toFixed(2)}m`
                );
                modelViewer.setAttribute('camera-target', '0m 0m 0m');
                modelViewer.setAttribute('field-of-view', `${viewState.fov.toFixed(2)}deg`);
                modelViewer.style.transform = `translate3d(${viewState.panX.toFixed(1)}px, ${viewState.panY.toFixed(1)}px, 0)`;
            }

            function animateViewer() {
                requestAnimationFrame(animateViewer);

                viewState.theta += (viewState.targetTheta - viewState.theta) * 0.18;
                viewState.phi += (viewState.targetPhi - viewState.phi) * 0.18;
                viewState.radius += (viewState.targetRadius - viewState.radius) * 0.16;
                viewState.fov += (viewState.targetFov - viewState.fov) * 0.2;
                viewState.panX += (viewState.targetPanX - viewState.panX) * 0.18;
                viewState.panY += (viewState.targetPanY - viewState.panY) * 0.18;

                updateModelViewer();
            }

            function calculateDistance(point1, point2) {
                const dx = point1.x - point2.x;
                const dy = point1.y - point2.y;
                const dz = point1.z - point2.z;
                return Math.sqrt(dx * dx + dy * dy + dz * dz);
            }

            function midpoint(point1, point2) {
                return {
                    x: (point1.x + point2.x) / 2,
                    y: (point1.y + point2.y) / 2
                };
            }

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function smoothValue(previous, next, amount) {
                if (previous === null || previous === undefined) {
                    return next;
                }

                return previous + (next - previous) * amount;
            }

            function applyDeadZone(value, threshold) {
                return Math.abs(value) < threshold ? 0 : value;
            }

            function isPinching(landmarks) {
                return calculateDistance(landmarks[4], landmarks[8]) < 0.075;
            }

            function resetModelPosition() {
                viewState.targetTheta = -20;
                viewState.targetPhi = 78;
                viewState.targetRadius = 28;
                viewState.targetFov = 60;
                viewState.targetPanX = 0;
                viewState.targetPanY = 0;
                resetGestureMemory();
                statusElement.textContent = 'Model position reset';
            }

            resetButton.addEventListener('click', resetModelPosition);

            function getPhysicalHandLabel(mediaPipeLabel) {
                // The preview is mirrored, so flip MediaPipe's label for controls.
                return mediaPipeLabel === 'Left' ? 'Right' : 'Left';
            }

            function drawLandmarks(landmarks, isLeft) {
                const screenSize = Math.min(window.innerWidth, window.innerHeight);
                const lineWidth = Math.max(2, Math.min(5, screenSize / 300));
                const pointSize = Math.max(2, Math.min(7, screenSize / 260));
                const handColor = isLeft ? '#67ff78' : '#5de7ff';

                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    [0, 17], [17, 18], [18, 19], [19, 20],
                    [5, 9], [9, 13], [13, 17]
                ];

                canvasCtx.lineWidth = lineWidth;
                canvasCtx.strokeStyle = handColor;

                connections.forEach(([i, j]) => {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(landmarks[i].x * canvasElement.width, landmarks[i].y * canvasElement.height);
                    canvasCtx.lineTo(landmarks[j].x * canvasElement.width, landmarks[j].y * canvasElement.height);
                    canvasCtx.stroke();
                });

                landmarks.forEach((landmark, index) => {
                    canvasCtx.fillStyle = index === 4 || index === 8 ? '#ff4f4f' : handColor;
                    canvasCtx.beginPath();
                    canvasCtx.arc(
                        landmark.x * canvasElement.width,
                        landmark.y * canvasElement.height,
                        pointSize,
                        0,
                        Math.PI * 2
                    );
                    canvasCtx.fill();
                });
            }

            function resetGestureMemory() {
                gestureState.lastPointer = null;
                gestureState.lastPinchPoint = null;
                gestureState.lastTwoHandDistance = null;
                gestureState.smoothedTwoHandDistance = null;
            }

            function handleRightHandRotate(landmarks) {
                const indexTip = landmarks[8];

                gestureState.lastTwoHandDistance = null;
                gestureState.smoothedTwoHandDistance = null;
                gestureState.lastPinchPoint = null;

                if (gestureState.lastPointer) {
                    const dx = indexTip.x - gestureState.lastPointer.x;
                    const dy = indexTip.y - gestureState.lastPointer.y;
                    viewState.targetTheta = viewState.targetTheta - dx * 420;
                    viewState.targetPhi = clamp(viewState.targetPhi + dy * 280, 15, 160);
                }

                gestureState.lastPointer = { x: indexTip.x, y: indexTip.y };
                statusElement.textContent = 'Rotating model with right hand';
            }

            function handleLeftHandPinchPan(landmarks) {
                const pinchPoint = midpoint(landmarks[4], landmarks[8]);

                gestureState.lastTwoHandDistance = null;
                gestureState.smoothedTwoHandDistance = null;
                gestureState.lastPointer = null;

                if (!isPinching(landmarks)) {
                    gestureState.lastPinchPoint = null;
                    statusElement.textContent = 'Pinch with left hand to pan';
                    return;
                }

                if (gestureState.lastPinchPoint) {
                    const dx = pinchPoint.x - gestureState.lastPinchPoint.x;
                    const dy = pinchPoint.y - gestureState.lastPinchPoint.y;
                    viewState.targetPanX = clamp(
                        viewState.targetPanX - dx * panSettings.sensitivity,
                        -panSettings.limit,
                        panSettings.limit
                    );
                    viewState.targetPanY = clamp(
                        viewState.targetPanY + dy * panSettings.sensitivity,
                        -panSettings.limit,
                        panSettings.limit
                    );
                }

                gestureState.lastPinchPoint = pinchPoint;
                statusElement.textContent = 'Panning model with left hand';
            }

            function handleTwoHands(firstHand, secondHand) {
                const firstWrist = firstHand[0];
                const secondWrist = secondHand[0];
                const rawHandDistance = calculateDistance(firstWrist, secondWrist);
                const handDistance = smoothValue(
                    gestureState.smoothedTwoHandDistance,
                    rawHandDistance,
                    zoomSettings.smoothing
                );
                gestureState.smoothedTwoHandDistance = handDistance;

                if (gestureState.lastTwoHandDistance !== null) {
                    const zoomDelta = clamp(
                        applyDeadZone(handDistance - gestureState.lastTwoHandDistance, zoomSettings.deadZone),
                        -zoomSettings.maxDelta,
                        zoomSettings.maxDelta
                    );
                    viewState.targetFov = clamp(
                        viewState.targetFov - zoomDelta * zoomSettings.sensitivity,
                        12,
                        90
                    );
                }

                gestureState.lastTwoHandDistance = handDistance;
                gestureState.lastPointer = null;
                gestureState.lastPinchPoint = null;
                statusElement.textContent = 'Zooming model with both hands';
            }

            async function initMediaPipeHands() {
                const hands = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });

                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.55,
                    minTrackingConfidence: 0.55
                });

                await hands.initialize();
                return hands;
            }

            function onResults(results) {
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (
                    canvasElement.width !== window.innerWidth ||
                    canvasElement.height !== window.innerHeight
                ) {
                    updateCanvasSize();
                }

                const hands = results.multiHandLandmarks || [];

                if (!hands.length) {
                    resetGestureMemory();
                    statusElement.textContent = 'Show your hand to control the model';
                    return;
                }

                hands.forEach((landmarks, index) => {
                    const handedness = getPhysicalHandLabel(results.multiHandedness[index].label);
                    drawLandmarks(landmarks, handedness === 'Left');
                });

                if (hands.length >= 2) {
                    handleTwoHands(hands[0], hands[1]);
                } else {
                    const handedness = getPhysicalHandLabel(results.multiHandedness[0].label);

                    if (handedness === 'Right') {
                        handleRightHandRotate(hands[0]);
                    } else {
                        handleLeftHandPinchPan(hands[0]);
                    }
                }
            }

            async function startApp() {
                try {
                    await initWebcam();
                    initModelViewer();

                    const hands = await initMediaPipeHands();
                    hands.onResults(onResults);

                    const mediaPipeCamera = new Camera(videoElement, {
                        onFrame: async () => {
                            await hands.send({ image: videoElement });
                        },
                        width: 1920,
                        height: 1080
                    });

                    mediaPipeCamera.start();
                } catch (error) {
                    statusElement.textContent = `Error: ${error.message}`;
                    console.error('Error starting viewer:', error);
                }
            }

            startApp();
        });
    </script>
</body>
</html>
